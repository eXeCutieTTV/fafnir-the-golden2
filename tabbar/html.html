<style>
  .tab-td {
    --w: 250px;
    width: var(--w);
    min-width: var(--w);
    max-width: var(--w);

    height: 30px;
    text-align: center;
    background-color: var(--bg1);
    border: solid 1px var(--bg1);
    border-bottom: 0;
    /*so the .active/hover borders are seemless*/
    user-select: none;
    cursor: pointer;
    padding: 0;
  }

  .tab-td:hover {
    background-color: var(--bg);
    border: solid 1px orange;
    border-bottom: 0;
  }

  .active-tab {
    border: solid 1px var(--accent);
    border-bottom: 0;
  }

  .active-tab:hover {
    border: solid 1px var(--accent);
    border-bottom: 0;
    background-color: var(--bg1);
  }

  .tab-a {
    display: block;
    width: 100%;
    height: 100%;
    text-align: center;
    align-content: center;
    white-space: nowrap;
  }
</style>
<div style="position: fixed; bottom: 0; width: calc(100% - 40px);">
  <div style=" overflow-x: auto; overflow-y: hidden;">
    <table style=" width: max-content; table-layout: fixed; border-collapse: collapse; border-collapse: separate; border-spacing: 0;">
      <tbody>
        <tr>
          <td class="tab-td"><a href="/index.html" class="tab-a"
              onclick="localStorage.setItem('active-tab',0)">Welcome</a></td>
          <td class="tab-td"><a href="/pages/dictionary/html.html" class="tab-a"
              onclick="localStorage.setItem('active-tab',1)">Dictionary</a></td>
          <td class="tab-td"><a href="#" class="tab-a" onclick="localStorage.setItem('active-tab',2)">a</a></td>
          <td class="tab-td"><a href="#" class="tab-a" onclick="localStorage.setItem('active-tab',3)">a</a></td>
          <td class="tab-td"><a href="#" class="tab-a" onclick="localStorage.setItem('active-tab',4)">a</a></td>
          <td class="tab-td"><a href="#" class="tab-a" onclick="localStorage.setItem('active-tab',5)">a</a></td>
          <td class="tab-td"><a href="#" class="tab-a" onclick="localStorage.setItem('active-tab',6)">a</a></td>
          <td class="tab-td"><a href="#" class="tab-a" onclick="localStorage.setItem('active-tab',7)">a</a></td>
          <td class="tab-td"><a href="#" class="tab-a" onclick="localStorage.setItem('active-tab',8)">a</a></td>
          <td class="tab-td"><a href="#" class="tab-a" onclick="localStorage.setItem('active-tab',9)">a</a></td>
          <td class="tab-td"><a href="#" class="tab-a" onclick="localStorage.setItem('active-tab',10)">a</a></td>
          <td class="tab-td"><a href="#" class="tab-a" onclick="localStorage.setItem('active-tab',11)">a</a></td>
          <td class="tab-td"><a href="#" class="tab-a" onclick="localStorage.setItem('active-tab',12)">a</a></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script>
  const tabId = localStorage.getItem('active-tab');
  document.querySelectorAll('.tab-td')[Number(tabId)].classList.add('active-tab');
</script>
