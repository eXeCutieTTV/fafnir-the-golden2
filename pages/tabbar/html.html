<style>
  .tabbar-table {
    width: max-content;
    table-layout: fixed;
    border-collapse: collapse;
  }

  .tab-td {
    --w: 250px;
    width: var(--w);
    min-width: var(--w);
    max-width: var(--w);

    height: 30px;
    text-align: center;
    background-color: var(--bg1);
    border: solid 1px var(--bg1);
    border-bottom: 0;
    /*so the .active/hover borders are seemless*/
    user-select: none;
    cursor: pointer;
    padding: 0;
  }

  .tab-td:hover {
    background-color: var(--bg);
    border: solid 1px orange;
    border-bottom: 0;
  }

  .active-tab {
    border: solid 1px var(--accent);
    border-bottom: 0;
  }

  .active-tab:hover {
    border: solid 1px var(--accent);
    border-bottom: 0;
    background-color: var(--bg1);
  }

  .tab-a {
    display: block;
    width: 100%;
    height: 100%;
    text-align: center;
    align-content: center;
    white-space: nowrap;
  }
</style>
